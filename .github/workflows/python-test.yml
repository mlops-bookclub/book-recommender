name: Python Tests

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - .github/workflows/python-test.yml
      # ToDo: fix paths after Merge Request #21
      - app/backend/**
      - src/**
      - tests/**
      - requirements.txt

jobs:
  backend-tests:
    name: backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend # ToDo: fix after #21
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests -q
